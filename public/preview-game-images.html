<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  body { margin: 0; background: #1a1a2e; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; gap: 16px; }
  h1 { color: #ffe033; font-family: 'Press Start 2P', monospace; font-size: 13px; letter-spacing: 0.08em; text-shadow: 2px 2px 0 #c80000; margin: 0; }
  .sub { color: #aaa; font-family: 'Press Start 2P', monospace; font-size: 8px; letter-spacing: 0.06em; margin: 0; text-align: center; line-height: 2; }
  .grid { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
  .card { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .label { color: #ffe033; font-family: 'Press Start 2P', monospace; font-size: 8px; letter-spacing: 0.06em; }
  canvas { border-radius: 12px; box-shadow: 0 0 0 3px #ffe033, 0 8px 32px rgba(0,0,0,0.8); image-rendering: pixelated; image-rendering: crisp-edges; }
</style>
</head>
<body>
<h1>★ NINTENDO PIXEL ART · REVIEW ★</h1>
<p class="sub">DETAILED PIXEL ART — PREMIUM FOOD RENDERING<br>35×40 PIXEL ART SCALED 5× TO 175×200</p>
<div class="grid" id="grid"></div>
<script>
const PIXEL = 5;
const AW = 35, AH = 40;

function makeCard(label, drawFn) {
  const card = document.createElement('div');
  card.className = 'card';
  const canvas = document.createElement('canvas');
  canvas.width = AW * PIXEL;
  canvas.height = AH * PIXEL;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  // Off-screen canvas at art resolution
  const off = document.createElement('canvas');
  off.width = AW; off.height = AH;
  const oc = off.getContext('2d');

  function px(x, y, c) {
    if (x < 0 || y < 0 || x >= AW || y >= AH) return;
    oc.fillStyle = c; oc.fillRect(x, y, 1, 1);
  }
  function rect(x, y, w, h, c) {
    if (w <= 0 || h <= 0) return;
    oc.fillStyle = c; oc.fillRect(x, y, w, h);
  }
  function circ(cx, cy, radius, color) {
    for (let y = -radius; y <= radius; y++)
      for (let x = -radius; x <= radius; x++)
        if (x*x + y*y <= radius*radius) px(cx+x, cy+y, color);
  }

  drawFn(px, rect, circ);
  ctx.drawImage(off, 0, 0, AW * PIXEL, AH * PIXEL);

  const lbl = document.createElement('div');
  lbl.className = 'label';
  lbl.textContent = label;
  card.appendChild(canvas);
  card.appendChild(lbl);
  return card;
}

/* ─────── PIZZA ─────── */
function drawPizza(p, r, circ) {
  // Background — dark restaurant blue
  r(0, 0, 35, 40, '#1e2d58');
  // Tablecloth — checkered
  for (let y = 27; y < 40; y++)
    for (let x = 0; x < 35; x++)
      p(x, y, (Math.floor(x/3)+Math.floor(y/3))%2 ? '#c22828' : '#eecece');
  // Tablecloth shadow
  for (let x = 0; x < 35; x++) p(x, 27, '#1e2d58');
  for (let x = 0; x < 35; x++) p(x, 28, '#993030');

  // Full pizza base
  circ(17, 24, 13, '#7a3a08');   // dark outer ring
  circ(17, 24, 12, '#c07018');   // crust outer
  circ(17, 24, 11, '#d88828');   // crust inner
  circ(17, 24, 10, '#f0b030');   // cheese base
  // Cheese variation / sauce
  circ(17, 24, 8,  '#e8a820');
  circ(15, 22, 3,  '#d49018');
  circ(20, 23, 3,  '#d49018');
  // Sauce peek-throughs
  p(17,21,'#cc3820'); p(16,20,'#cc3820'); p(18,22,'#bb3018');
  p(12,24,'#cc3820'); p(22,26,'#bb3018'); p(17,27,'#cc3820');
  // Cheese highlights
  p(15,19,'#f8e050'); p(20,20,'#f8e050'); p(22,23,'#f8d040');
  p(12,22,'#f8e060'); p(13,26,'#f0d848');

  // Pepperoni (outline + fill + inner shadow)
  function pepperoni(cx,cy,rad) {
    circ(cx,cy,rad,'#8a1010');
    circ(cx,cy,rad-1,'#cc2020');
    p(cx,cy,'#881010');
    p(cx-1,cy-1,'#ee3030'); // highlight
  }
  pepperoni(17,21,3); pepperoni(11,25,2); pepperoni(23,23,2);
  pepperoni(14,28,2); pepperoni(21,27,2);

  // Mushroom slices
  r(12,23,2,1,'#9a8060'); r(12,22,2,1,'#b89878'); p(12,21,'#c8a888'); p(13,21,'#c8a888');
  r(22,25,2,1,'#9a8060'); r(22,24,2,1,'#b89878'); p(22,23,'#c8a888'); p(23,23,'#c8a888');

  // Green olive rings at corners
  p(3,3,'#228816'); p(4,2,'#33aa22'); p(5,3,'#228816');
  p(2,4,'#228816'); p(6,4,'#228816');
  p(3,5,'#228816'); p(4,6,'#33aa22'); p(5,5,'#228816');
  p(4,4,'#66cc44');

  // Floating pepper slice (top-right)
  p(30,3,'#ee4418'); p(31,2,'#ee4418'); p(32,3,'#ee4418');
  p(29,4,'#ee4418'); p(33,4,'#ee4418');
  p(30,5,'#ee4418'); p(31,6,'#ee4418'); p(32,5,'#ee4418');
  p(31,4,'#ffaa30');

  // Slice being lifted — top center
  r(14,2,7,1,'#c07018');
  for (let y=3;y<10;y++) {
    const spread = Math.floor((y-3)/1.3);
    const x1=14-spread, x2=20+spread;
    if(x1>=0) p(x1,y, y<6?'#c07018':'#f0b030');
    if(x2<35) p(x2,y, y<6?'#c07018':'#f0b030');
  }
  r(15,5,5,2,'#f0b030');
  r(15,6,5,1,'#e8a820');
  circ(17,6,1,'#cc2020'); // tiny pepperoni on slice

  // Cheese strings (pull)
  p(16,10,'#f8e050'); p(17,11,'#f0d840'); p(18,10,'#f8e050');
  p(15,12,'#f0d040'); p(17,13,'#e8c828'); p(19,12,'#f0d040');
}

/* ─────── SANDWICH ─────── */
function drawSando(p, r, circ) {
  // Warm wooden cafe background
  r(0, 0, 35, 40, '#c09050');
  for (let y = 0; y < 40; y+=4)
    for (let x = 0; x < 35; x++)
      if ((x+y*2)%10 < 2) p(x, y, '#a87838');
  // Table top
  r(0,32,35,8,'#8a5c28'); r(0,32,35,2,'#a87030');
  // Plate
  r(2,29,31,2,'#e8e0d0'); r(1,30,33,1,'#d4ccc0'); r(2,31,31,1,'#c8c0b0');

  // === SANDWICH LAYERS ===
  const L=4, W=27;
  // Bottom bun
  r(L,26,W,3,'#cc8818'); r(L,26,W,1,'#e09830'); r(L+2,29,W-4,1,'#b07010');
  // Patty
  r(L,23,W,3,'#7a3010'); r(L,23,W,1,'#9a4820');
  for (let i=0;i<5;i++) p(L+2+i*5,24,'#5a2008'); // grill marks
  // Cheese drape
  r(L-1,21,W+2,2,'#ffdd22');
  p(L-1,23,'#ffcc00'); p(L-1,24,'#ffaa00');
  p(L+W,23,'#ffcc00'); p(L+W,24,'#ffaa00');
  // Tomato
  r(L,19,W,2,'#ee3020'); r(L,19,W,1,'#ff4432');
  p(L+3,20,'#cc1810'); p(L+9,20,'#cc1810'); p(L+15,20,'#cc1810'); p(L+21,20,'#cc1810');
  // Lettuce (wavy)
  for (let x=L;x<L+W;x++) {
    const wave = (x%4<2)?0:1;
    p(x,17+wave,'#44cc44'); p(x,16+wave,'#66ee66');
  }
  // Top bun body
  r(L,13,W,3,'#e09830');
  // Bun dome
  r(L+2,11,W-4,2,'#f0aa30');
  r(L+4,9,W-8,2,'#f8cc40');
  r(L+7,8,W-14,1,'#f8cc40');
  // Sesame seeds
  r(L+5,9,2,1,'#fff8e0'); r(L+13,8,2,1,'#fff8e0'); r(L+21,9,2,1,'#fff8e0');

  // Parsley garnish
  p(L+W+1,28,'#33aa30'); p(L+W+2,27,'#33aa30'); p(L+W+1,27,'#55cc44');
  p(L+W+2,28,'#22882a');
}

/* ─────── COFFEE ─────── */
function drawCoffee(p, r, circ) {
  // Sunrise bands (warm)
  const bands = ['#e07010','#ee8820','#f8a030','#ffb840','#ffcc58','#ffdd70'];
  bands.forEach((c,i) => r(0,i*5,35,5,c));
  r(0,30,35,10,'#c07020');
  // Ground planks
  r(0,30,35,2,'#aa6018');
  r(3,32,11,4,'#9a5515'); r(16,32,11,4,'#9a5515');
  // Sun
  circ(17,4,3,'#ffe840'); p(17,4,'#fff090'); p(17,3,'#ffff80');
  // Sunrays
  [0,45,90,135,180,225,270,315].forEach(a => {
    const rad = a*Math.PI/180;
    p(Math.round(17+5.5*Math.cos(rad)), Math.round(4+5.5*Math.sin(rad)), '#ffd020');
  });
  // Steam wisps (curvy)
  p(11,12,'#fff8f0'); p(10,10,'#fff0e8'); p(11,8,'#fff8f0'); p(10,6,'#ffe8e0');
  p(17,11,'#fff8f0'); p(17,9,'#fff0e8'); p(16,7,'#fff8f0');
  p(23,12,'#fff8f0'); p(24,10,'#fff0e8'); p(23,8,'#fff8f0'); p(24,6,'#ffe8e0');

  // Cup body (trapezoid-ish)
  for (let y=13;y<27;y++) {
    const i=Math.round((y-13)*0.12);
    r(7+i,y,21-i*2,1, y%3===0?'#dd4812':'#cc4410');
  }
  // Highlight left strip
  for (let y=14;y<26;y++) {
    const i=Math.round((y-14)*0.12);
    p(9+i,y,'#ee5522');
  }
  // Top rim
  r(7,12,21,2,'#dd3010'); r(8,11,19,1,'#ee4418');
  // Coffee surface
  circ(17,12,9,'#180800'); circ(17,12,7,'#220c00');
  // Latte art
  p(17,11,'#e8c060'); p(15,12,'#d4aa50'); p(19,12,'#d4aa50');
  p(16,13,'#c89840'); p(18,13,'#c89840'); p(17,14,'#b88830');
  // Handle
  p(28,16,'#cc4410'); p(29,15,'#cc4410'); p(30,15,'#cc4410');
  p(30,16,'#cc4410'); p(30,17,'#bb3e0e'); p(30,18,'#bb3e0e');
  p(30,19,'#bb3e0e'); p(30,20,'#cc4410'); p(30,21,'#cc4410');
  p(29,22,'#cc4410'); p(28,22,'#cc4410');
  // Saucer
  r(4,27,27,1,'#e0c8a0'); r(5,27,25,1,'#d4b888');
  r(5,28,25,1,'#c8a878'); r(7,29,21,1,'#bca070');
  // Star sparkle
  p(18,20,'#ffe033'); p(17,19,'#ffe033'); p(19,19,'#ffe033');
  p(18,18,'#ffe033'); p(18,21,'#ffe033');
}

/* ─────── COCKTAIL / ROOFTOP ─────── */
function drawCocktail(p, r, circ) {
  r(0,0,35,40,'#080618');
  // Gradient sky (lighter near horizon)
  for (let y=20;y<30;y++) r(0,y,35,1,'#'+Math.floor((y-20)*4+8).toString(16).padStart(2,'0')+'0520');

  // Stars
  [[2,2],[8,5],[15,3],[22,1],[28,4],[33,7],[5,9],[31,11],[1,14],[34,17],[6,3],[24,8]].forEach(([x,y],i) => {
    p(x,y, i>9?'#ffe844':'#ffffff');
  });

  // Building silhouettes
  r(0,28,4,12,'#100c28'); r(5,32,5,8,'#100c28');
  r(11,26,3,14,'#100c28'); r(12,24,1,4,'#100c28');
  r(15,30,5,10,'#100c28'); r(21,27,4,13,'#100c28');
  r(26,31,3,9,'#100c28'); r(30,28,5,12,'#100c28');
  // Window lights
  p(1,30,'#ffee44'); p(1,34,'#ffee44');
  p(6,33,'#44aaff'); p(7,33,'#44aaff');
  p(16,32,'#ffee44'); p(17,32,'#ffee44');
  p(22,29,'#ffee44'); p(22,33,'#ffee44');
  p(31,30,'#ff88cc'); p(31,34,'#44aaff');
  p(12,27,'#ff8844'); p(13,29,'#ff8844');

  // === COCKTAIL GLASS ===
  // Rim
  r(8,10,19,1,'#dde8ff'); r(9,11,17,1,'#c8d8ff');
  // Liquid fill (V-shape)
  for (let y=12;y<25;y++) {
    const n=Math.floor((y-12)*0.55);
    for (let x=9+n;x<=26-n;x++) {
      const shade=(x-(9+n))/Math.max(1,(26-n)-(9+n));
      let c='#ee66aa';
      if (y<15) c='#ff8acc';
      else if (shade<0.12||shade>0.88) c='#cc3377';
      p(x,y,c);
    }
  }
  // Liquid top shimmer
  r(10,12,4,1,'#ffccee'); r(10,13,2,1,'#ffd8f4');
  // Glass outline
  for (let y=12;y<25;y++) {
    const n=Math.floor((y-12)*0.55);
    p(9+n,y,'#aabcee'); p(26-n,y,'#aabcee');
  }
  // Stem + base
  r(16,25,3,1,'#c8d8ff'); r(17,26,1,5,'#aabdee');
  r(13,31,9,1,'#c8d8ff'); r(14,32,7,1,'#aabdee');
  // Olive garnish
  p(25,9,'#eeeeff'); p(26,8,'#eeeeff'); p(27,7,'#eeeeff');
  circ(27,6,2,'#1a6010'); p(27,6,'#cc1810');
  // Bubble highlights
  p(14,18,'#ffddee'); p(20,15,'#ffddee'); p(17,21,'#ffddee');
}

/* ─────── BURGER ─────── */
function drawBurger(p, r, circ) {
  // Bold red-orange bg
  r(0,0,35,40,'#c81e0a');
  r(0,0,35,12,'#dd2a14');
  // Speed/energy dots
  [1,4,7,10,13,16,19,22,25,28,31].forEach(x => { p(x,0,'#ee3818'); p(x,39,'#ee3818'); });
  // Road
  r(0,35,35,5,'#1a1a1a'); r(0,35,35,2,'#242424');
  r(3,37,8,1,'#ffe033'); r(14,37,8,1,'#ffe033'); r(25,37,8,1,'#ffe033');

  // === BURGER ===
  const L=3, W=29;
  // Top bun dome
  for (let y=7;y<13;y++) {
    const dome=Math.max(0,Math.round((13-y)*1.4));
    r(L+dome,y,W-dome*2,1, y<9?'#f8cc40':'#f0b030');
    if (y===9) r(L+dome,y,W-dome*2,1,'#f0b030');
  }
  r(L,12,W,1,'#e0a020');
  // Sesame seeds
  r(L+3,8,3,1,'#fff8e0'); r(L+12,7,3,1,'#fff8e0'); r(L+21,8,3,1,'#fff8e0');
  // Shine on bun
  r(L+5,9,2,1,'#fce878'); r(L+6,10,1,1,'#fce878');

  // Cheese (melting)
  r(L-1,13,W+2,2,'#ffdd22'); r(L-1,13,W+2,1,'#ffe840');
  p(L-1,15,'#ffcc00'); p(L-1,16,'#ffaa00');
  p(L+W,15,'#ffcc00'); p(L+W,16,'#ffaa00');

  // Lettuce
  for (let x=L;x<L+W;x++) {
    const wave=(x%5<2)?0:1;
    r(x,15+wave,1,2,'#33bb33'); p(x,15+wave,'#55dd55');
  }
  // Tomato
  r(L,18,W,3,'#ee3020'); r(L,18,W,1,'#ff4432');
  p(L+4,19,'#cc1810'); p(L+10,20,'#cc1810'); p(L+16,19,'#cc1810'); p(L+22,20,'#cc1810');

  // Patty (dark, realistic)
  r(L,21,W,5,'#6e2c0c'); r(L,21,W,1,'#8e3e18'); r(L,21,W,1,'#9a4820');
  for (let i=0;i<5;i++) p(L+2+i*5,23,'#4a1c06'); // grill marks
  for (let i=0;i<5;i++) p(L+3+i*5,24,'#4a1c06');

  // Bottom bun
  r(L,26,W,3,'#cc8818'); r(L,26,W,1,'#e09830'); r(L+2,29,W-4,1,'#b07010');
}

const grid = document.getElementById('grid');
[
  ['PIZZA MANIA',     drawPizza],
  ['SANDO MADNESS',   drawSando],
  ['STILL COFFEE',    drawCoffee],
  ['SKYLINE ROOFTOP', drawCocktail],
  ['BURGER NIGHT',    drawBurger],
].forEach(([label, fn]) => grid.appendChild(makeCard(label, fn)));
</script>
</body>
</html>
